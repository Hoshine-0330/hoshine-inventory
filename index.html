<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <title>合盛硅业 - 库存管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e6f7ff 0%, #f0f5ff 100%);
            min-height: 100vh;
            color: #333;
            font-size: 14px;
            line-height: 1.6;
        }
        .main-page { display: flex; min-height: 100vh; }
        .sidebar {
            width: 220px;
            background: linear-gradient(180deg, #1677ff 0%, #0958d9 100%);
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            box-shadow: 2px 0 12px rgba(22,119,255,0.2);
        }
        .sidebar-logo {
            text-align: center;
            padding: 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 20px;
        }
        .sidebar-logo h2 { color: #fff; font-size: 18px; font-weight: 600; }
        .sidebar-logo p { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 4px; }
        .sidebar-menu { list-style: none; }
        .sidebar-menu li {
            padding: 14px 24px;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-menu li:hover, .sidebar-menu li.active { background: rgba(255,255,255,0.15); color: #fff; }
        .sidebar-menu li.active { background: rgba(255,255,255,0.2); border-left: 3px solid #fff; }
        .sidebar-user {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            text-align: center;
        }
        .main-content { flex: 1; margin-left: 220px; padding: 0; }
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px 32px; background: white; 
            box-shadow: 0 2px 12px rgba(22,119,255,0.1); 
        }
        .header h1 { font-size: 20px; color: #1677ff; font-weight: 600; }
        .header-right { display: flex; gap: 12px; }
        .nav-btn { padding: 10px 20px; background: #f5f5f5; border: none; border-radius: 8px; color: #666; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .nav-btn:hover, .nav-btn.active { background: #1677ff; color: #fff; }
        .main-container { padding: 24px 32px; }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 25px; }
        .stat-card { 
            background: white; box-shadow: 0 4px 16px rgba(22,119,255,0.1); 
            border: 1px solid #91d5ff; border-left: 5px solid #1677ff;
            padding: 24px 20px; border-radius: 12px; text-align: left;
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(22,119,255,0.15); }
        .stat-card .num { font-size: 32px; font-weight: 700; color: #1677ff; margin-bottom: 8px; }
        .stat-card .label { font-size: 14px; color: #666; }
        .warehouse-section { 
            background: white; box-shadow: 0 2px 12px rgba(0,0,0,0.05); 
            border-radius: 12px; margin-bottom: 20px; overflow: hidden; 
        }
        .warehouse-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 16px 24px; background: linear-gradient(135deg, #1677ff, #4096ff);
            color: #fff;
        }
        .warehouse-header h3 { font-size: 16px; font-weight: 600; }
        .warehouse-header .total { font-size: 14px; opacity: 0.9; }
        .product-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 14px; background: #fafafa; border-radius: 10px; 
            margin-bottom: 8px; cursor: pointer; transition: all 0.2s; 
        }
        .product-item:hover { background: #e6f7ff; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(22,119,255,0.1); }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .dashboard-section { display: none; }
        .dashboard-section.active { display: block; }
        .toolbar { 
            display: flex; gap: 12px; margin-bottom: 20px; background: white;
            padding: 16px 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            flex-wrap: wrap;
        }
        .toolbar input[type="text"] { flex: 1; min-width: 200px; padding: 12px 16px; border: 1px solid #e8e8e8; border-radius: 8px; font-size: 14px; }
        .toolbar button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .btn-add { background: #52c41a; color: #fff; }
        .btn-import { background: #1677ff; color: #fff; }
        .btn-clear { background: #ff4d4f; color: #fff; }
        .btn-sync { background: #00b891; color: #fff; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        .admin-table th, .admin-table td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .admin-table th { background: #1677ff; color: #fff; font-weight: 600; font-size: 13px; }
        .admin-table tr:hover { background: #f0f7ff; }
        .action-btns button { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; margin-right: 4px; }
        .btn-edit { background: #1677ff; color: #fff; }
        .btn-delete { background: #ff4d4f; color: #fff; }
        .login-page { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .login-box h2 { margin-bottom: 30px; color: #1677ff; font-size: 22px; font-weight: 600; }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #d9d9d9; border-radius: 10px; font-size: 14px; }
        .login-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; background: linear-gradient(135deg, #1677ff, #4096ff); color: #fff; font-size: 16px; font-weight: 500; cursor: pointer; }
        .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        .filter-bar select, .filter-bar input { padding: 10px 16px; border: 1px solid #e8e8e8; border-radius: 8px; background: white; font-size: 14px; }
        .product-list { padding: 12px; }
        .product-info { flex: 1; }
        .product-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
        .product-stock { text-align: right; }
        .stock-num { font-size: 20px; font-weight: 600; color: #1677ff; }
        .stock-unit { font-size: 12px; color: #999; margin-left: 3px; }
        .stock-date { display: flex; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px dashed rgba(0,0,0,0.1); }
        .date-item { flex: 1; text-align: center; padding: 6px; border-radius: 6px; font-size: 12px; }
        .date-3m { background: #e6f7ff; }
        .date-3m .val { color: #096dd9; }
        .date-3to9 { background: #fff7e6; }
        .date-3to9 .val { color: #fa8c16; }
        .date-9plus { background: #fff1f0; }
        .date-9plus .val { color: #ff4d4f; }
        .transit-badge { display: inline-block; font-size: 11px; background: #fff7e6; color: #fa8c16; padding: 2px 6px; border-radius: 6px; margin-left: 6px; }
        .quick-actions { display: flex; gap: 12px; margin-bottom: 20px; }
        .quick-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 16px; background: white; border: 1px solid #e8e8e8; border-radius: 12px; cursor: pointer; }
        .quick-btn.primary { background: linear-gradient(135deg, #1677ff, #4096ff); color: #fff; border: none; }
        .detail-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .detail-modal.active { display: flex; }
        .detail-box { background: white; border-radius: 16px; width: 100%; max-width: 1200px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
        .detail-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 28px; background: linear-gradient(135deg, #1677ff, #4096ff); color: #fff; }
        .detail-header h2 { font-size: 20px; font-weight: 600; }
        .detail-close { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border: none; border-radius: 50%; color: #fff; font-size: 20px; cursor: pointer; }
        .detail-content { padding: 24px 28px; overflow-y: auto; flex: 1; }
        .detail-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .detail-stat { background: linear-gradient(135deg, #f0f7ff, #e6f0ff); border: 1px solid #91d5ff; border-radius: 12px; padding: 20px; text-align: center; }
        .detail-stat .val { font-size: 26px; font-weight: 700; color: #1677ff; }
        .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 20px; }
        .detail-table th, .detail-table td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .detail-table th { background: #f0f5ff; color: #1677ff; font-weight: 600; }
        .form-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1001; }
        .form-modal.active { display: flex; }
        .form-box { background: white; padding: 24px; border-radius: 12px; width: 100%; max-width: 500px; }
        .form-box.large { max-width: 800px; }
        .form-box h3 { margin-bottom: 16px; color: #1677ff; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; margin-bottom: 6px; color: #666; font-size: 13px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #e8e8e8; border-radius: 8px; font-size: 14px; }
        .form-actions { display: flex; gap: 10px; margin-top: 16px; }
        .form-actions button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-save { background: #1677ff; color: #fff; }
        .btn-cancel { background: #666; color: #fff; }
        .import-customer-table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        .import-customer-table th, .import-customer-table td { padding: 10px; border: 1px solid #e8e8e8; text-align: left; }
        .import-customer-table th { background: #f5f7fa; color: #1677ff; }
        .import-hint { color: #888; font-size: 12px; margin-top: 8px; }
        .empty { text-align: center; padding: 40px; color: #999; background: white; border-radius: 12px; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .loading-spinner { background: white; padding: 20px 40px; border-radius: 12px; font-size: 16px; color: #1677ff; }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } .stats-row { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="login-page" id="loginPage">
        <div class="login-box">
            <h2>🏭 合盛硅业库存管理</h2>
            <input type="text" id="username" placeholder="请输入用户名">
            <input type="password" id="password" placeholder="请输入密码">
            <button class="login-btn" id="loginBtn">登录</button>
        </div>
    </div>

    <div class="main-page" id="mainPage" style="display:none;">
        <div class="sidebar">
            <div class="sidebar-logo"><h2>🏭 合盛硅业</h2><p>库存管理系统</p></div>
            <ul class="sidebar-menu">
                <li class="active" onclick="showPage('dashboard')"><span>📊</span> 首页</li>
                <li onclick="showPage('admin')"><span>⚙️</span> 后台管理</li>
                <li onclick="logout()"><span>🚪</span> 退出登录</li>
            </ul>
            <div class="sidebar-user">当前用户：admin</div>
        </div>
        
        <div class="main-content">
            <div class="header">
                <h1>📦 库存管理</h1>
                <div class="header-right">
                    <button class="nav-btn" onclick="showPage('dashboard')">首页</button>
                    <button class="nav-btn" onclick="showPage('admin')">后台管理</button>
                    <button class="nav-btn" onclick="logout()">退出</button>
                </div>
            </div>

            <div class="main-container dashboard-section active" id="dashboardSection">
                <div class="filter-bar">
                    <select id="warehouseFilter" onchange="onFilterChange()"><option value="">全部仓库</option></select>
                    <select id="productFilter" onchange="onFilterChange()"><option value="">全部产品</option></select>
                </div>
                <div class="stats-row">
                    <div class="stat-card"><div class="num" id="statProducts">0</div><div class="label">商品种类</div></div>
                    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">总库存(吨)</div></div>
                    <div class="stat-card"><div class="num" id="statLastUpdate">--</div><div class="label">最后更新</div></div>
                </div>
                <div class="quick-actions">
                    <button class="quick-btn primary" onclick="showAddModal()"><span>📥</span><span>入库</span></button>
                    <button class="quick-btn" onclick="showAddModal()"><span>📤</span><span>出库</span></button>
                    <button class="quick-btn" onclick="showPage('admin')"><span>📋</span><span>库存管理</span></button>
                    <button class="quick-btn" onclick="syncToGistManually()"><span>☁️</span><span>同步云端</span></button>
                </div>
                <div id="productContainer"></div>
            </div>

            <div class="main-container admin-section" id="adminSection">
                <div class="toolbar">
                    <input type="text" id="searchInput" placeholder="搜索产品..." oninput="renderAdminTable()">
                    <button class="btn-add" onclick="showAddModal()">+ 添加</button>
                    <button class="btn-import" onclick="document.getElementById('csvInput').click()">📥 导入Excel</button>
                    <button class="btn-import" onclick="exportData()">📤 导出CSV</button>
                    <button class="btn-sync" onclick="syncToGistManually()">☁️ 同步到云端</button>
                    <button class="btn-clear" onclick="clearAllData()">🗑️ 清空</button>
                    <input type="file" id="csvInput" accept=".csv,.xlsx,.xls" style="display:none" onchange="importData(event)">
                </div>
                <table class="admin-table">
                    <thead><tr><th>ID</th><th>产品名称</th><th>型号</th><th>仓库</th><th>库存(吨)</th><th>已签单(吨)</th><th>ETD</th><th>ETA</th><th>合同编号</th><th>操作</th></tr></thead>
                    <tbody id="adminTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="detail-modal" id="detailModal">
        <div class="detail-box">
            <div class="detail-header"><h2 id="detailTitle">产品详情</h2><button class="detail-close" onclick="closeDetail()">×</button></div>
            <div class="detail-content">
                <div class="filter-bar">
                    <select id="detailWhFilter" onchange="renderDetailTable()"><option value="">全部仓库</option></select>
                    <select id="detailModelFilter" onchange="renderDetailTable()"><option value="">全部型号</option></select>
                    <select id="detailStatusFilter" onchange="renderDetailTable()"><option value="">全部状态</option><option value="在库">在库</option><option value="在途">在途</option></select>
                </div>
                <div class="detail-stats">
                    <div class="detail-stat"><div class="val" id="detailTotal">0</div><div class="label">总库存(吨)</div></div>
                    <div class="detail-stat"><div class="val" id="detailSigned">0</div><div class="label">✓ 已签单</div></div>
                    <div class="detail-stat"><div class="val" id="detailInTransit">0</div><div class="label">🚚 在途</div></div>
                    <div class="detail-stat"><div class="val" id="detailForSale">0</div><div class="label">📤 待售</div></div>
                </div>
                <h4 style="margin:15px 0 10px;color:#1677ff;">📋 库存明细</h4>
                <table class="detail-table"><thead><tr><th>型号</th><th>仓库</th><th>状态</th><th>库存(吨)</th><th>已签单(吨)</th><th>在途(吨)</th><th>ETD</th><th>ETA</th><th>合同编号</th><th>待售(吨)</th><th>操作</th></tr></thead><tbody id="detailTable"></tbody></table>
                <h4 style="margin:15px 0 10px;color:#1677ff;">✓ 已签单客户明细</h4>
                <table class="detail-table"><thead><tr><th>型号</th><th>客户名称</th><th>数量(吨)</th><th>操作</th></tr></thead><tbody id="customerTable"></tbody></table>
                <button class="btn-add" style="margin-top:10px;padding:8px 16px;" onclick="showSignedCustomerModal()">+ 录入已签单客户</button>
            </div>
        </div>
    </div>

    <div class="form-modal" id="signedCustomerModal">
        <div class="form-box">
            <h3>录入已签单客户</h3>
            <div class="form-group"><label>产品名称 *</label><select id="signedProductFilter" onchange="updateSignedCustomerFilters()"><option value="">请选择产品</option></select></div>
            <div class="form-group"><label>仓库</label><select id="signedWarehouseFilter" onchange="updateSignedCustomerFilters()"><option value="">请选择仓库</option></select></div>
            <div class="form-group"><label>型号</label><select id="signedModelFilter" onchange="updateSignedCustomerFilters()"><option value="">请选择型号</option></select></div>
            <div class="form-group"><label>客户名称 *</label><input type="text" id="signedCustomerName" placeholder="请输入客户名称"></div>
            <div class="form-group"><label>数量(吨) *</label><input type="number" id="signedCustomerQty" placeholder="请输入吨数"></div>
            <div class="form-actions"><button class="btn-save" onclick="saveSignedCustomer()">保存</button><button class="btn-cancel" onclick="closeSignedCustomerModal()">取消</button></div>
        </div>
    </div>

    <div class="form-modal" id="formModal">
        <div class="form-box">
            <h3 id="formTitle">添加产品</h3>
            <div class="form-group"><label>产品名称 *</label><input type="text" id="formName"></div>
            <div class="form-group"><label>型号</label><input type="text" id="formModel"></div>
            <div class="form-group"><label>仓库</label><input type="text" id="formWarehouse"></div>
            <div class="form-group"><label>库存数量(吨)</label><input type="number" id="formQuantity"></div>
            <div class="form-group"><label>3月内(吨)</label><input type="number" id="formWithin3"></div>
            <div class="form-group"><label>3-9月(吨)</label><input type="number" id="formMonth3to9"></div>
            <div class="form-group"><label>9月+(吨)</label><input type="number" id="formOver9"></div>
            <div class="form-group"><label>ETD</label><input type="text" id="formETD" placeholder="预计开船日"></div>
            <div class="form-group"><label>ETA</label><input type="text" id="formETA" placeholder="预计到港日"></div>
            <div class="form-group"><label>合同编号</label><input type="text" id="formContractNo"></div>
            <div class="form-group"><label>已签单客户</label><input type="text" id="formSignedCustomers" placeholder="客户名,吨数; 客户B,20"></div>
            <div class="form-actions"><button class="btn-save" onclick="saveProduct()">保存</button><button class="btn-cancel" onclick="closeForm()">取消</button></div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        // 使用 Cloudflare Worker 作为后端（Gist 代理）
        const API_BASE = 'https://inventory-api.mark-43d.workers.dev';
        
        let products = [];
        let editingId = null;
        let currentDetailProduct = '';
        let currentDetailWhFilter = '';

        // ==================== 工具函数 ====================
        function showLoading(show) {
            let overlay = document.getElementById('loadingOverlay');
            if (show) {
                if (!overlay) {
                    overlay = document.createElement('div');
                    overlay.id = 'loadingOverlay';
                    overlay.className = 'loading-overlay';
                    overlay.innerHTML = '<div class="loading-spinner">⏳ 加载中...</div>';
                    document.body.appendChild(overlay);
                }
                overlay.style.display = 'flex';
            } else if (overlay) {
                overlay.style.display = 'none';
            }
        }

        function logout() {
            document.getElementById("loginPage").style.display = "flex";
            document.getElementById("mainPage").style.display = "none";
        }

        function showPage(page) {
            document.querySelectorAll('.sidebar-menu li').forEach(li => li.classList.remove('active'));
            if (page === 'dashboard') {
                document.getElementById('dashboardSection').classList.add('active');
                document.getElementById('adminSection').classList.remove('active');
                document.querySelector('.sidebar-menu li:first-child').classList.add('active');
                renderProducts();
            } else {
                document.getElementById('dashboardSection').classList.remove('active');
                document.getElementById('adminSection').classList.add('active');
                document.querySelector('.sidebar-menu li:nth-child(2)').classList.add('active');
                renderAdminTable();
            }
        }

        // ==================== Gist 数据同步 ====================
        async function fetchFromGist() {
            try {
                const response = await fetchWithRetry(`${API_BASE}/read`, {}, 3, 1500);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (Array.isArray(data)) return data;
                if (data && Array.isArray(data.data)) return data.data;
                return null;
            } catch (err) {
                console.error('fetchFromGist error:', err);
                return null;
            }
        }

        // 重试fetch的辅助函数
        async function fetchWithRetry(url, options, retries = 3, delay = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                } catch (err) {
                    console.log(`尝试 ${i+1}/${retries} 失败: ${err.message}`);
                    if (i < retries - 1) await new Promise(r => setTimeout(r, delay));
                }
            }
            throw new Error('网络请求失败');
        }

        async function syncToGist(data) {
            try {
                const response = await fetchWithRetry(`${API_BASE}/write`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }, 3, 1500);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const result = await response.json();
                return result.success === true;
            } catch (err) {
                console.error('syncToGist error:', err);
                // 备用方案：保存到本地存储
                localStorage.setItem('hoshine_products_pending', JSON.stringify(data));
                localStorage.setItem('hoshine_pending_time', new Date().toISOString());
                alert('⚠️ 云端同步失败，数据已临时保存在本地。网络恢复后请重试同步。');
                return false;
            }
        }

        async function syncToGistManually() {
            showLoading(true);
            const success = await syncToGist(products);
            showLoading(false);
            if (success) {
                alert('✅ 同步成功！数据已保存到云端');
            } else {
                alert('❌ 同步失败，请检查网络后重试。\n\n如持续失败，请尝试：\n1. 更换网络（关闭VPN）\n2. 清除浏览器缓存\n3. 换个浏览器');
            }
        }

        // ==================== 数据加载与保存 ====================
        function loadData() {
            showLoading(true);
            fetchFromGist().then(gistData => {
                if (gistData && gistData.length > 0) {
                    products = gistData;
                    console.log('从 Gist 加载:', products.length, '条');
                    localStorage.setItem('hoshine_products', JSON.stringify(products));
                    localStorage.setItem('hoshine_lastUpdate', new Date().toISOString());
                } else {
                    const stored = localStorage.getItem('hoshine_products');
                    if (stored) {
                        try {
                            products = JSON.parse(stored);
                            console.log('从 localStorage 加载:', products.length, '条');
                        } catch(e) { console.error('解析失败'); }
                    } else {
                        console.log('使用默认数据');
                    }
                }
                showLoading(false);
                initFilters();
                renderProducts();
                renderAdminTable();
            }).catch(err => {
                console.error('加载失败:', err);
                const stored = localStorage.getItem('hoshine_products');
                if (stored) {
                    try {
                        products = JSON.parse(stored);
                        console.log('从 localStorage 加载:', products.length, '条');
                    } catch(e) {}
                }
                showLoading(false);
                initFilters();
                renderProducts();
                renderAdminTable();
            });
        }

        function saveData() {
            localStorage.setItem('hoshine_products', JSON.stringify(products));
            localStorage.setItem('hoshine_lastUpdate', new Date().toISOString());
            syncToGist(products).then(success => {
                if (success) console.log('已同步到 Gist');
                else console.warn('同步到 Gist 失败');
            });
        }

        // ==================== 筛选与渲染 ====================
        function initFilters() {
            updateFilterOptions('', '');
        }

        function onFilterChange() {
            const whFilter = document.getElementById('warehouseFilter').value;
            const prodFilter = document.getElementById('productFilter').value;
            updateFilterOptions(whFilter, prodFilter);
            renderProducts();
        }

        function updateFilterOptions(whFilter, prodFilter) {
            let filtered = [...products];
            if (prodFilter) filtered = filtered.filter(p => p.name === prodFilter);
            const rawWarehouses = filtered.map(p => p.warehouse || '未知仓库');
            const baseWarehouses = rawWarehouses.map(wh => wh.replace('在途仓', '').replace('在途', '').replace(/仓库$/, '').replace(/仓$/, '').replace('印度', '').trim());
            const warehouses = [...new Set(baseWarehouses)].sort();
            
            filtered = [...products];
            if (whFilter) filtered = filtered.filter(p => {
                const baseWh = (p.warehouse || '').replace('在途仓', '').replace('在途', '').replace(/仓库$/, '').replace(/仓$/, '').replace('印度', '').trim();
                return baseWh === whFilter;
            });
            const productNames = [...new Set(filtered.map(p => p.name).filter(Boolean))].sort();
            
            const currentWh = document.getElementById('warehouseFilter').value;
            const currentProd = document.getElementById('productFilter').value;
            document.getElementById('warehouseFilter').innerHTML = '<option value="">全部仓库</option>' + warehouses.map(w => `<option value="${w}" ${w === currentWh ? 'selected' : ''}>${w}</option>`).join('');
            document.getElementById('productFilter').innerHTML = '<option value="">全部产品</option>' + productNames.map(p => `<option value="${p}" ${p === currentProd ? 'selected' : ''}>${p}</option>`).join('');
        }

        function renderProducts() {
            const whFilter = document.getElementById('warehouseFilter').value;
            const prodFilter = document.getElementById('productFilter').value;
            let filtered = [...products];
            if (whFilter) filtered = filtered.filter(p => {
                const baseWh = (p.warehouse || '').replace('在途仓', '').replace('在途', '').replace(/仓库$/, '').replace(/仓$/, '').replace('印度', '').trim();
                return baseWh === whFilter;
            });
            if (prodFilter) filtered = filtered.filter(p => p.name === prodFilter);

            const groupMap = {};
            filtered.forEach(p => {
                let wh = p.warehouse || '未知仓库';
                const isInTransit = wh.includes('在途仓');
                let baseKey = wh.replace('在途仓', '').replace('在途', '').replace(/仓库$/, '').replace(/仓$/, '').replace('印度', '').trim();
                const name = p.name || '未知产品';
                const key = baseKey + '||' + name;
                if (!groupMap[key]) {
                    groupMap[key] = { warehouse: baseKey, name: name, total: 0, within3: 0, month3to9: 0, over9: 0, inTransit: 0, etd: p.etd || '', eta: p.eta || '', contractNo: p.contractNo || '' };
                }
                if (isInTransit) {
                    groupMap[key].inTransit += p.quantity || 0;
                } else {
                    groupMap[key].total += p.quantity || 0;
                }
                groupMap[key].within3 += p.within3Months || 0;
                groupMap[key].month3to9 += p.month3to9 || 0;
                groupMap[key].over9 += p.over9Months || 0;
                if (p.etd) groupMap[key].etd = p.etd;
                if (p.eta) groupMap[key].eta = p.eta;
                if (p.contractNo) groupMap[key].contractNo = p.contractNo;
            });
            
            const whGroupMap = {};
            Object.values(groupMap).forEach(g => {
                const wh = g.warehouse;
                if (!whGroupMap[wh]) whGroupMap[wh] = { warehouse: wh, products: [], total: 0, inTransit: 0 };
                whGroupMap[wh].products.push(g);
                whGroupMap[wh].total += g.total;
                whGroupMap[wh].inTransit += g.inTransit;
            });

            document.getElementById('productContainer').innerHTML = Object.values(whGroupMap).map(g => `
                <div class="warehouse-section">
                    <div class="warehouse-header"><h3>📍 ${g.warehouse}仓${g.inTransit > 0 ? ' (在途' + g.inTransit.toFixed(0) + '吨)' : ''}</h3><span class="total">合计: ${(g.total + g.inTransit).toFixed(2)}吨</span></div>
                    <div class="product-list">${g.products.map(p => `
                        <div class="product-item" onclick="showDetail('${p.name}', '${whFilter}')">
                            <div class="product-info">
                                <div class="product-name">${p.name}</div>
                                ${p.inTransit > 0 ? `<span class="transit-badge">🚚 在途: ${p.inTransit.toFixed(2)}吨</span>` : ''}
                                ${p.etd ? `<span style="color:#1890ff;font-size:12px;margin-left:8px;">ETD:${p.etd}</span>` : ''}
                                ${p.eta ? `<span style="color:#1890ff;font-size:12px;margin-left:8px;">ETA:${p.eta}</span>` : ''}
                                ${p.contractNo ? `<span style="color:#722ed1;font-size:12px;margin-left:8px;">📝${p.contractNo}</span>` : ''}
                            </div>
                            <div class="product-stock"><span class="stock-num">${(p.total + p.inTransit).toFixed(2)}</span><span class="stock-unit">吨</span></div>
                            <div class="stock-date">
                                <div class="date-item date-3m"><div class="label">3月内</div><div class="val">${p.within3.toFixed(2)}</div></div>
                                <div class="date-item date-3to9"><div class="label">3-9月</div><div class="val">${p.month3to9.toFixed(2)}</div></div>
                                <div class="date-item date-9plus"><div class="label">9月+</div><div class="val">${p.over9.toFixed(2)}</div></div>
                            </div>
                        </div>`).join('')}
                    </div>
                </div>`).join('') || '<div class="empty">暂无库存</div>';

            const productSet = new Set(filtered.map(p => p.name));
            const totalQty = filtered.reduce((s,p)=>s+(p.quantity||0),0);
            document.getElementById('statProducts').textContent = productSet.size;
            document.getElementById('statTotal').textContent = totalQty.toFixed(2);
            const lastUpdate = localStorage.getItem('hoshine_lastUpdate');
            if (lastUpdate) {
                const date = new Date(lastUpdate);
                const now = new Date();
                const diffDays = Math.floor((now - date) / 86400000);
                document.getElementById('statLastUpdate').textContent = diffDays === 0 ? '今天' : diffDays + '天前';
            } else {
                document.getElementById('statLastUpdate').textContent = '--';
            }
        }

        // ==================== 详情弹窗 ====================
        function showDetail(name, whFilter) {
            currentDetailProduct = name;
            currentDetailWhFilter = whFilter || '';
            const items = products.filter(p => p.name === name);
            const models = [...new Set(items.map(p => p.model).filter(Boolean))].sort();
            const warehouses = [...new Set(items.map(p => {
                const wh = p.warehouse || '未知仓库';
                return wh.replace('在途仓', '').replace('在途', '').replace(/仓库$/, '').replace(/仓$/, '').replace('印度', '').trim();
            }))].sort();
            
            document.getElementById('detailModelFilter').innerHTML = '<option value="">全部型号</option>' + models.map(m => `<option value="${m}">${m}</option>`).join('');
            document.getElementById('detailWhFilter').innerHTML = '<option value="">全部仓库</option>' + warehouses.map(w => `<option value="${w}">${w}</option>`).join('');
            document.getElementById('detailTitle').textContent = name;
            renderDetailTable();
            document.getElementById('detailModal').classList.add('active');
        }

        function renderDetailTable() {
            const modelFilter = document.getElementById('detailModelFilter').value;
            const whFilter = document.getElementById('detailWhFilter').value;
            const statusFilter = document.getElementById('detailStatusFilter').value;
            
            let items = products.filter(p => p.name === currentDetailProduct);
            if (modelFilter) items = items.filter(p => p.model === modelFilter);
            if (whFilter) items = items.filter(p => {
                const baseWh = (p.warehouse || '').replace('在途仓', '').replace('在途', '').replace(/仓库$/, '').replace(/仓$/, '').replace('印度', '').trim();
                return baseWh === whFilter;
            });
            if (statusFilter) {
                items = items.filter(p => statusFilter === '在途' ? (p.warehouse || '').includes('在途仓') : !(p.warehouse || '').includes('在途仓'));
            }
            
            const mergedMap = {};
            items.forEach(p => {
                let wh = p.warehouse || '未知仓库';
                const isInTransit = wh.includes('在途仓');
                let baseKey = wh.replace('在途仓', '').replace('在途', '').replace(/仓库$/, '').replace(/仓$/, '').replace('印度', '').trim();
                const key = baseKey + '||' + (p.model || '无型号');
                if (!mergedMap[key]) {
                    mergedMap[key] = { warehouse: baseKey, model: p.model || '无型号', stock: 0, inTransit: 0, signed: 0, forSale: 0, etd: p.etd || '', eta: p.eta || '', contractNo: p.contractNo || '' };
                }
                if (!mergedMap[key].etd && p.etd) mergedMap[key].etd = p.etd;
                if (!mergedMap[key].eta && p.eta) mergedMap[key].eta = p.eta;
                if (!mergedMap[key].contractNo && p.contractNo) mergedMap[key].contractNo = p.contractNo;
                if (isInTransit) {
                    mergedMap[key].inTransit += p.quantity || 0;
                } else {
                    mergedMap[key].stock += p.quantity || 0;
                }
                if (p.signedCustomers && p.signedCustomers.length > 0) {
                    mergedMap[key].signed += p.signedCustomers.reduce((s, c) => s + c.quantity, 0);
                }
                mergedMap[key].forSale += p.forSale || 0;
            });
            
            const mergedList = Object.values(mergedMap);
            const total = mergedList.reduce((s, p) => s + p.stock + p.inTransit, 0);
            const totalInTransit = mergedList.reduce((s, p) => s + p.inTransit, 0);
            const signed = mergedList.reduce((s, p) => s + p.signed, 0);
            const forSale = mergedList.reduce((s, p) => s + p.forSale, 0);
            
            document.getElementById('detailTotal').textContent = total.toFixed(2);
            document.getElementById('detailSigned').textContent = signed.toFixed(2);
            document.getElementById('detailInTransit').textContent = totalInTransit.toFixed(2);
            document.getElementById('detailForSale').textContent = forSale.toFixed(2);
            
            let detailHtml = '';
            mergedList.forEach(item => {
                if (item.stock > 0) {
                    detailHtml += `<tr><td>${item.model}</td><td>${item.warehouse}</td><td style="color:#52c41a">库存</td><td style="color:#1677ff;font-weight:bold">${item.stock.toFixed(2)}</td><td>${item.signed.toFixed(2)}</td><td>-</td><td>-</td><td>-</td><td>-</td><td>${(item.stock - item.signed).toFixed(2)}</td><td><button onclick="deleteProductByWhModel('${item.warehouse}', '${item.model}')" style="background:#ff4d4f;color:#fff;padding:4px 8px;border:none;border-radius:4px;cursor:pointer;">删除</button></td></tr>`;
                }
                if (item.inTransit > 0) {
                    detailHtml += `<tr><td>${item.model}</td><td>${item.warehouse}</td><td style="color:#fa8c16">在途</td><td style="color:#1677ff;font-weight:bold">${item.inTransit.toFixed(2)}</td><td>${item.signed.toFixed(2)}</td><td>${item.inTransit.toFixed(2)}</td><td><input type="text" value="${item.etd}" style="width:85px;" onchange="updateTransitInfo('${item.warehouse}', '${item.model}', 'etd', this.value)"></td><td><input type="text" value="${item.eta}" style="width:85px;" onchange="updateTransitInfo('${item.warehouse}', '${item.model}', 'eta', this.value)"></td><td><input type="text" value="${item.contractNo}" style="width:100px;" onchange="updateTransitInfo('${item.warehouse}', '${item.model}', 'contractNo', this.value)"></td><td>${(item.stock - item.signed).toFixed(2)}</td><td><button onclick="deleteProductByWhModel('${item.warehouse}', '${item.model}')" style="background:#ff4d4f;color:#fff;padding:4px 8px;border:none;border-radius:4px;cursor:pointer;">删除</button></td></tr>`;
                }
            });
            document.getElementById('detailTable').innerHTML = detailHtml || '<tr><td colspan="11">暂无数据</td></tr>';
            
            const customerMap = {};
            products.filter(p => p.name === currentDetailProduct).forEach(p => {
                if (p.signedCustomers && p.signedCustomers.length > 0) {
                    p.signedCustomers.forEach(c => {
                        const key = (p.model || '无型号') + '||' + c.customer;
                        if (customerMap[key]) customerMap[key].quantity += c.quantity;
                        else customerMap[key] = { customer: c.customer, model: p.model || '无型号', quantity: c.quantity };
                    });
                }
            });
            const customers = Object.values(customerMap);
            document.getElementById('customerTable').innerHTML = customers.length > 0 ? customers.map(c => `<tr><td>${c.model}</td><td>${c.customer}</td><td style="color:#1677ff">${c.quantity.toFixed(2)}吨</td><td><button onclick="deleteSignedRecord('${c.model}', '${c.customer}')" style="background:#ff4d4f;color:#fff;padding:4px 8px;border:none;border-radius:4px;cursor:pointer;">删除</button></td></tr>`).join('') : '<tr><td colspan="4">暂无已签单客户</td></tr>';
        }

        function closeDetail() { document.getElementById('detailModal').classList.remove('active'); }

        function deleteSignedRecord(model, customer) {
            if (!confirm('确定删除该客户记录？')) return;
            products.forEach(p => {
                if (p.name === currentDetailProduct && p.model === model && p.signedCustomers) {
                    const idx = p.signedCustomers.findIndex(c => c.customer === customer);
                    if (idx >= 0) {
                        p.signedCustomers.splice(idx, 1);
                        p.signed = p.signedCustomers.reduce((s, c) => s + c.quantity, 0);
                    }
                }
            });
            saveData();
            renderDetailTable();
        }

        function updateTransitInfo(warehouse, model, field, value) {
            products.filter(p => p.warehouse === warehouse && p.model === model).forEach(p => { p[field] = value; });
            saveData();
        }

        function deleteProductByWhModel(warehouse, model) {
            if (!confirm('确定删除该产品？')) return;
            products = products.filter(p => !(p.warehouse === warehouse && p.model === model));
            saveData();
            renderAdminTable();
            initFilters();
            renderProducts();
            closeDetail();
        }

        function showAddModal() {
            editingId = null;
            document.getElementById('formTitle').textContent = '添加产品';
            ['formName','formModel','formWarehouse','formQuantity','formWithin3','formMonth3to9','formOver9','formETD','formETA','formContractNo','formSignedCustomers'].forEach(id => document.getElementById(id).value = '');

        function editProduct(id) {
            const p = products.find(p => p.id === id);
            if (!p) return;
            editingId = id;
            document.getElementById('formTitle').textContent = '编辑产品';
            document.getElementById('formName').value = p.name || '';
            document.getElementById('formModel').value = p.model || '';
            document.getElementById('formWarehouse').value = p.warehouse || '';
            document.getElementById('formQuantity').value = p.quantity || 0;
            document.getElementById('formWithin3').value = p.within3Months || 0;
            document.getElementById('formMonth3to9').value = p.month3to9 || 0;
            document.getElementById('formOver9').value = p.over9Months || 0;
            document.getElementById('formETD').value = p.etd || '';
            document.getElementById('formETA').value = p.eta || '';
            document.getElementById('formContractNo').value = p.contractNo || '';
            let signedStr = '';
            if (p.signedCustomers && p.signedCustomers.length > 0) {
                signedStr = p.signedCustomers.map(c => c.customer + ',' + c.quantity).join('; ');
            }
            document.getElementById('formSignedCustomers').value = signedStr;
            document.getElementById('formModal').classList.add('active');
        }

        function saveProduct() {
            const name = document.getElementById('formName').value;
            if (!name) { alert('请输入产品名称'); return; }
            const signedInput = document.getElementById('formSignedCustomers').value;
            const signedCustomers = [];
            if (signedInput.trim()) {
                signedInput.split(';').forEach(pair => {
                    const [customer, qty] = pair.split(',');
                    if (customer && qty) signedCustomers.push({ customer: customer.trim(), quantity: parseFloat(qty) || 0 });
                });
            }
            const totalSigned = signedCustomers.reduce((s, c) => s + c.quantity, 0);
            const product = {
                id: editingId || Date.now(),
                name: name,
                model: document.getElementById('formModel').value,
                warehouse: document.getElementById('formWarehouse').value,
                quantity: parseFloat(document.getElementById('formQuantity').value) || 0,
                within3Months: parseFloat(document.getElementById('formWithin3').value) || 0,
                month3to9: parseFloat(document.getElementById('formMonth3to9').value) || 0,
                over9Months: parseFloat(document.getElementById('formOver9').value) || 0,
                etd: document.getElementById('formETD').value,
                eta: document.getElementById('formETA').value,
                contractNo: document.getElementById('formContractNo').value,
                signed: totalSigned,
                signedCustomers: signedCustomers,
                forSale: (parseFloat(document.getElementById('formQuantity').value) || 0) - totalSigned
            };
            if (editingId) {
                const idx = products.findIndex(p => p.id === editingId);
                if (idx > -1) products[idx] = product;
            } else {
                products.push(product);
            }
            saveData();
            closeForm();
            renderAdminTable();
            initFilters();
            renderProducts();
        }

        function deleteProduct(id) {
            if (!confirm('确定删除？')) return;
            products = products.filter(p => p.id !== id);
            saveData();
            renderAdminTable();
            initFilters();
            renderProducts();
        }

        function closeForm() { document.getElementById('formModal').classList.remove('active'); }

        function clearAllData() {
            if (!confirm('⚠️ 确定清空所有数据？此操作不可恢复！')) return;
            products = [];
            saveData();
            renderAdminTable();
            initFilters();
            renderProducts();
            alert('数据已清空');
        }

        // ==================== 导入导出 ====================
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!XLSX) { alert('Excel库加载中，请稍后重试'); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    if (jsonData.length < 2) { alert('文件内容为空'); return; }
                    const headers = jsonData[0].map(h => String(h).trim());
                    const nameIdx = headers.indexOf('物料描述');
                    const modelIdx = headers.indexOf('物料号');
                    const warehouseIdx = headers.indexOf('库存地点描述');
                    const qtyIdx = headers.indexOf('期末库存数');
                    if (nameIdx === -1) { alert('未找到"物料描述"列'); return; }
                    let importedCount = 0;
                    const now = new Date().toISOString();
                    for (let i = 1; i < jsonData.length; i++) {
                        const row = jsonData[i];
                        const name = row[nameIdx];
                        if (!name) continue;
                        const qty = (parseFloat(row[qtyIdx]) || 0) / 1000;
                        if (qty <= 0) continue;
                        products.push({
                            id: Date.now() + i,
                            name: String(name).replace(/\\n/g, ' ').trim(),
                            model: modelIdx !== -1 ? (row[modelIdx] ? String(row[modelIdx]) : '') : '',
                            warehouse: warehouseIdx !== -1 ? (row[warehouseIdx] || '') : '',
                            quantity: Math.round(qty * 100) / 100,
                            within3Months: 0,
                            month3to9: 0,
                            over9Months: 0,
                            signed: 0,
                            signedCustomers: [],
                            forSale: Math.round(qty * 100) / 100,
                            lastUpdate: now
                        });
                        importedCount++;
                    }
                    if (importedCount > 0) {
                        localStorage.setItem('hoshine_lastUpdate', now);
                        saveData();
                        alert(`导入成功，共${importedCount}条`);
                        initFilters();
                        renderProducts();
                        renderAdminTable();
                    } else {
                        alert('未找到有效数据');
                    }
                } catch (err) {
                    alert('解析失败: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
            event.target.value = '';
        }

        function exportData() {
            if (products.length === 0) { alert('没有数据'); return; }
            let csv = '产品名称,型号,仓库,库存(吨),已签单(吨),ETD,ETA,合同编号\n';
            products.forEach(p => csv += `${p.name || ''},${p.model || ''},${p.warehouse || ''},${p.quantity || 0},${p.signed || 0},${p.etd || ''},${p.eta || ''},${p.contractNo || ''}\n`);
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `库存数据_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        // ==================== 已签单客户 ====================
        function showSignedCustomerModal() {
            const productNames = [...new Set(products.map(p => p.name).filter(Boolean))].sort();
            document.getElementById('signedProductFilter').innerHTML = '<option value="">请选择产品</option>' + productNames.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('signedWarehouseFilter').innerHTML = '<option value="">请选择仓库</option>';
            document.getElementById('signedModelFilter').innerHTML = '<option value="">请选择型号</option>';
            document.getElementById('signedCustomerName').value = '';
            document.getElementById('signedCustomerQty').value = '';
            document.getElementById('signedCustomerModal').classList.add('active');
        }

        function updateSignedCustomerFilters() {
            const name = document.getElementById('signedProductFilter').value;
            if (!name) return;
            let filtered = products.filter(p => p.name === name);
            const warehouses = [...new Set(filtered.map(p => {
                const wh = p.warehouse || '未知仓库';
                return wh.replace('在途仓', '').replace('在途', '').replace(/仓库$/, '').replace(/仓$/, '').replace('印度', '').trim();
            }))].sort();
            const whSelect = document.getElementById('signedWarehouseFilter');
            const currentWh = whSelect.value;
            whSelect.innerHTML = '<option value="">请选择仓库</option>' + warehouses.map(w => `<option value="${w}" ${w === currentWh ? 'selected' : ''}>${w}</option>`).join('');
            
            const warehouse = whSelect.value;
            if (warehouse) {
                filtered = filtered.filter(p => {
                    const baseWh = (p.warehouse || '').replace('在途仓', '').replace('在途', '').replace(/仓库$/, '').replace(/仓$/, '').replace('印度', '').trim();
                    return baseWh === warehouse;
                });
            }
            const models = [...new Set(filtered.map(p => p.model).filter(Boolean))].sort();
            const modelSelect = document.getElementById('signedModelFilter');
            modelSelect.innerHTML = '<option value="">请选择型号</option>' + models.map(m => `<option value="${m}">${m}</option>`).join('');
        }

        function closeSignedCustomerModal() {
            document.getElementById('signedCustomerModal').classList.remove('active');
        }

        function saveSignedCustomer() {
            const name = document.getElementById('signedProductFilter').value;
            const model = document.getElementById('signedModelFilter').value;
            const warehouse = document.getElementById('signedWarehouseFilter').value;
            const customer = document.getElementById('signedCustomerName').value.trim();
            const qty = parseFloat(document.getElementById('signedCustomerQty').value);
            if (!name) { alert('请选择产品'); return; }
            if (!customer) { alert('请输入客户名称'); return; }
            if (!qty || qty <= 0) { alert('请输入有效吨数'); return; }
            
            let product = products.find(p => p.name === name);
            if (warehouse) {
                product = products.find(p => p.name === name && (p.warehouse || '').includes(warehouse));
            }
            if (model && product) {
                product = products.find(p => p.name === name && p.model === model);
            }
            if (!product) { alert('未找到匹配产品'); return; }
            
            if (!product.signedCustomers) product.signedCustomers = [];
            const existing = product.signedCustomers.find(c => c.customer === customer);
            if (existing) existing.quantity += qty;
            else product.signedCustomers.push({ customer, quantity: qty });
            product.signed = product.signedCustomers.reduce((s, c) => s + c.quantity, 0);
            saveData();
            closeSignedCustomerModal();
            alert(`✅ 已录入：${customer} ${qty}吨`);
        }

        // ==================== 登录与初始化 ====================
        document.getElementById("loginBtn").addEventListener("click", function() {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            if (username && password) {
                document.getElementById("loginPage").style.display = "none";
                document.getElementById("mainPage").style.display = "block";
                loadData();
                showPage('dashboard');
            } else {
                alert("请输入用户名和密码");
            }
        });

        // 允许回车登录
        document.getElementById("password").addEventListener("keypress", function(e) {
            if (e.key === "Enter") document.getElementById("loginBtn").click();
        });
    </script>
</body>
</html>
