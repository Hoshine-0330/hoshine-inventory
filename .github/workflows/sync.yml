name: Sync Feishu to Gist

on:
  schedule:
    - cron: '*/15 * * * *'  
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Get Feishu Data
        id: feishu
        run: |
          TOKEN=$(curl -s -X POST 'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal' \
            -H 'Content-Type: application/json' \
            -d '{"app_id": "${{ secrets.FEISHU_APP_ID }}", "app_secret": "${{ secrets.FEISHU_APP_SECRET }}"}' | jq -r '.tenant_access_token')
          
          curl -s "https://open.feishu.cn/open-apis/bitable/v1/apps/${{ secrets.FEISHU_APP_TOKEN }}/tables/${{ secrets.FEISHU_TABLE_ID }}/records" \
            -H "Authorization: Bearer $TOKEN" > records.json
          
          echo "DATA=$(cat records.json | jq -c '.data.items')" >> $GITHUB_OUTPUT
      
      - name: Update Gist
        uses: actions/update-gist@v1
        with:
          gist-id: ${{ secrets.GIST_ID }}
          filename: inventory.json
          content: ${{ steps.feishu.outputs.DATA }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

